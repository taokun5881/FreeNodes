name: "🚨 紧急恢复同步"

on:
  schedule:
    - cron: '*/30 * * * *' # 每30分钟执行一次
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  emergency-check:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: 🚨 紧急状态检查
        id: emergency_check
        run: |
          echo "🚨 开始紧急状态检查..."
          if [ -f "README.md" ]; then
            LAST_UPDATE=$(grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} [0-9]\{2\}:[0-9]\{2\}:[0-9]\{2\}' README.md | tail -1)
