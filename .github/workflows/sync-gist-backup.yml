name: 🔄 备用同步节点文件

on:
  workflow_dispatch:
    inputs:
      emergency_trigger:
        description: '是否由紧急恢复触发'
        required: false
        default: 'false'

permissions:
  contents: write
  actions: write

jobs:
  sync-gist-backup:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      REPO_RAW_BASE_URL: "https://raw.githubusercontent.com/taokun5881/FreeNodes/main"

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: 🔄 下载节点文件
        run: |
          mkdir -p nodes
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/all.yaml" -o nodes/all.yaml || echo "❌ all.yaml 下载失败"
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/base64.txt" -o nodes/base64.txt || echo "❌ base64.txt 下载失败"

      - name: 💾 提交备用同步
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action (Backup)"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "🔄 备用同步节点文件 - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "ℹ️ 没有检测到文件变更"
        env:
          GITHUB_TOKEN: ${{ github.token }}
