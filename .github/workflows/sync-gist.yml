name: 🔄 同步 Gist 节点文件

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ '.github/workflows/sync-gist.yml' ]

permissions:
  contents: write
  actions: read

jobs:
  sync-gist:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      REPO_RAW_BASE_URL: "https://raw.githubusercontent.com/taokun5881/FreeNodes/main"

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: 🔍 执行节点下载与统计
        run: |
          mkdir -p nodes
          echo "📥 下载节点文件..."
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/all.yaml" -o nodes/all.yaml || echo "❌ all.yaml 下载失败"
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/base64.txt" -o nodes/base64.txt || echo "❌ base64.txt 下载失败"
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/history.yaml" -o nodes/history.yaml || echo "❌ history.yaml 下载失败"
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/mihomo.yaml" -o nodes/mihomo.yaml || echo "❌ mihomo.yaml 下载失败"

          yaml_nodes=0
          base64_lines=0
          if [ -f "nodes/all.yaml" ]; then
            yaml_nodes=$(grep -c "server:" nodes/all.yaml || echo "0")
          fi
          if [ -f "nodes/base64.txt" ]; then
            base64_lines=$(base64 -d nodes/base64.txt 2>/dev/null | grep -c "://" || echo "0")
          fi
          echo "📊 YAML=$yaml_nodes, Base64=$base64_lines"
          echo "yaml_nodes=$yaml_nodes" >> $GITHUB_OUTPUT
          echo "base64_lines=$base64_lines" >> $GITHUB_OUTPUT

      - name: 💾 更新 README
        run: |
          current_date=$(date '+%Y-%m-%d %H:%M:%S')
          if [ -f "README.md" ]; then
            sed -i '/<!-- AUTO_STATS_START -->/,/<!-- AUTO_STATS_END -->/{
              s/| 🕐 \*\*最后更新时间\*\* | .* |/| 🕐 **最后更新时间** | '"$current_date"' |/
              s/| 📄 \*\*YAML 节点\*\* | .* |/| 📄 **YAML 节点** | '"${{ steps.sync-gist.outputs.yaml_nodes }}"' 个 |/
              s/| 📝 \*\*Base64 节点数\*\* | .* |/| 📝 **Base64 节点数** | '"${{ steps.sync-gist.outputs.base64_lines }}"' 个 |/
              s/| 🔄 \*\*同步状态\*\* | .* |/| 🔄 **同步状态** | 🟢 已同步 |/
            }' README.md
          fi

      - name: 自动更新节点文件
  run: |
    # 配置 Git 用户信息
    git config --local user.email "action@github.com"
    git config --local user.name "GitHub Action"

    # 获取最新提交信息
    LAST_COMMIT_MSG=$(git log -1 --pretty=%B)

    # 如果上次提交已经是自动更新的，则跳过
    if [[ "$LAST_COMMIT_MSG" == *"🔄 自动更新节点文件"* ]]; then
      echo "ℹ️ 上次提交已经是自动更新，跳过此次操作"
      exit 0
    fi

- name: 自动更新节点文件
  run: |
    # 配置 Git 用户信息
    git config --local user.email "action@github.com"
    git config --local user.name "GitHub Action"

    # 获取最新提交信息
    LAST_COMMIT_MSG=$(git log -1 --pretty=%B)

    # 如果上次提交已经是自动更新的，则跳过
    if [[ "$LAST_COMMIT_MSG" == *"🔄 自动更新节点文件"* ]]; then
      echo "ℹ️ 上次提交已经是自动更新，跳过此次操作"
      exit 0
    fi

    # 检查是否有文件变更
    if [ -n "$(git status --porcelain)" ]; then
      git add .
      git commit -m "🔄 自动更新节点文件 - $(date '+%Y-%m-%d %H:%M:%S') [skip ci]"
      git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:main
    else
      echo "ℹ️ 没有检测到文件变更"
    fi
  shell: bash
  env:
    TZ: Asia/Shanghai
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
