name: sync-nodes

on:
  schedule:
    - cron: '*/30 * * * *' # 每30分钟自动执行
  workflow_dispatch:        # 允许手动触发
  push:
    branches: [ main ]
    paths: [ '.github/workflows/sync-nodes.yml' ]

permissions:
  contents: write
  actions: read

jobs:
  sync-nodes:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 0

      - name: 🔍 健康检查
        id: health_check
        run: |
          echo "🔍 开始健康检查..."
          if [ -f "README.md" ]; then
            LAST_UPDATE=$(grep -o '[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\} [0-9]\{2\}:[0-9]\{2\}:[0-9]\{2\}' README.md | tail -1)
            CURRENT_TIMESTAMP=$(date +%s)
            LAST_TIMESTAMP=$(date -d "$LAST_UPDATE" +%s 2>/dev/null || echo "0")
            TIME_DIFF=$(( (CURRENT_TIMESTAMP - LAST_TIMESTAMP) / 60 ))
            if [ "$TIME_DIFF" -lt 30 ]; then
              echo "SKIP_EXECUTION=true" >> $GITHUB_OUTPUT
              echo "EXECUTION_REASON=距离上次更新不足30分钟" >> $GITHUB_OUTPUT
            else
              echo "SKIP_EXECUTION=false" >> $GITHUB_OUTPUT
              echo "EXECUTION_REASON=正常执行间隔(${TIME_DIFF}分钟)" >> $GITHUB_OUTPUT
            fi
          else
            echo "SKIP_EXECUTION=false" >> $GITHUB_OUTPUT
            echo "EXECUTION_REASON=README.md不存在，初始化执行" >> $GITHUB_OUTPUT
          fi
          echo "TRIGGER_TYPE=${{ github.event_name }}" >> $GITHUB_OUTPUT

      - name: 📊 执行状态报告
        run: |
          echo "## 🔍 执行状态检查" >> $GITHUB_STEP_SUMMARY
          echo "**触发方式**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**执行原因**: ${{ steps.health_check.outputs.EXECUTION_REASON }}" >> $GITHUB_STEP_SUMMARY
          echo "**是否跳过**: ${{ steps.health_check.outputs.SKIP_EXECUTION }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.health_check.outputs.SKIP_EXECUTION }}" = "true" ]; then
            echo "⏭️ 本次执行将被跳过" >> $GITHUB_STEP_SUMMARY
          else
            echo "▶️ 继续执行更新流程" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🟢 设置 Node.js 环境
        if: steps.health_check.outputs.SKIP_EXECUTION != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📁 创建 nodes 目录
        if: steps.health_check.outputs.SKIP_EXECUTION != 'true'
        run: mkdir -p nodes

      - name: 📥 下载节点文件
        if: steps.health_check.outputs.SKIP_EXECUTION != 'true'
        env:
          REPO_RAW_BASE_URL: "https://raw.githubusercontent.com/taokun5881/FreeNodes/main"
        run: |
          echo "📥 正在下载节点文件..."
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/all.yaml" -o nodes/all.yaml || echo "❌ all.yaml 下载失败"
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/base64.txt" -o nodes/base64.txt || echo "❌ base64.txt 下载失败"
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/history.yaml" -o nodes/history.yaml || echo "❌ history.yaml 下载失败"
          curl -fsSL "${REPO_RAW_BASE_URL}/nodes/mihomo.yaml" -o nodes/mihomo.yaml || echo "❌ mihomo.yaml 下载失败"

      - name: 🔢 统计节点数量
        if: steps.health_check.outputs.SKIP_EXECUTION != 'true'
        id: count
        run: |
          yaml_nodes=0
          base64_lines=0
          if [ -f "nodes/all.yaml" ]; then
            yaml_nodes=$(grep -c "server:" nodes/all.yaml || echo 0)
          fi
          if [ -f "nodes/base64.txt" ]; then
            decoded=$(base64 -d nodes/base64.txt 2>/dev/null || echo "")
            base64_lines=$(echo "$decoded" | grep -c "^[a-zA-Z0-9]*://" || echo 0)
          fi
          echo "yaml_nodes=$yaml_nodes" >> $GITHUB_OUTPUT
          echo "base64_lines=$base64_lines" >> $GITHUB_OUTPUT
          echo "节点统计完成: YAML=$yaml_nodes, BASE64=$base64_lines"

      - name: 🔄 提交并推送更新
        if: steps.health_check.outputs.SKIP_EXECUTION != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "🔄 自动更新节点文件 - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "ℹ️ 没有检测到文件变更"
        env:
          GITHUB_TOKEN: ${{ github.token }}
